<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - معهد أم القرى للتدريب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a365d; 
            --secondary-color: #2b6cb0;
            --accent-color: #ecc94b; 
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --input-focus: #ebf8ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #ebf8ff 0%, #f7fafc 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            display: flex;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            overflow: hidden;
            width: 900px;
            max-width: 95%;
            height: 550px;
        }

        .login-form-section {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .institute-logo {
            max-width: 180px;
            margin: 0 auto 30px auto;
            display: block;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
            background-color: #fff;
        }

        .form-control:focus {
            border-color: var(--secondary-color);
            background-color: var(--input-focus);
            outline: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 13px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .forgot-password {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }

        .forgot-password:hover { color: var(--primary-color); }

        .btn-login {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-login:hover { background-color: #122846; }
        .btn-login:active { transform: scale(0.98); }

        .login-image-section {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-image-section::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 10%, transparent 10%);
            background-size: 30px 30px;
            z-index: 1;
        }

        .welcome-content { position: relative; z-index: 2; }
        .welcome-content h1 { font-size: 36px; font-weight: 800; margin-bottom: 15px; color: var(--accent-color); }
        .welcome-content p { font-size: 16px; line-height: 1.6; opacity: 0.9; }

        @media (max-width: 768px) {
            .login-container { flex-direction: column; height: auto; max-width: 400px; }
            .login-image-section { display: none; }
            .login-form-section { padding: 40px 30px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-form-section">
            <img src="uqt.jpeg" alt="شعار معهد أم القرى للتدريب" class="institute-logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/180x80/1a365d/ffffff?text=معهد+أم+القرى';">
            
            <div class="login-header">
                <h2>بوابة الدخول</h2>
                <p>نظام EduFlow لإدارة التدريب والموارد</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">اسم المستخدم أو البريد الأكاديمي</label>
                    <input type="text" id="username" class="form-control" placeholder="مثال: hadeel@uqu-training.edu.sa" required autofocus>
                </div>

                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span>تذكرني على هذا الجهاز</span>
                    </label>
                    <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn-login">تسجيل الدخول</button>
            </form>
        </div>

        <div class="login-image-section">
            <div class="welcome-content">
                <h1>مرحباً بكِ</h1>
                <p>المنصة الموحدة للمدربات والإدارة العليا.<br>نوفر بيئة ذكية لتتبع الحضور، إدارة المقررات، وأتمتة الإجراءات الأكاديمية بكل سهولة وموثوقية.</p>
                <div style="margin-top: 40px; opacity: 0.5; font-size: 12px;">
                    Powered by EduFlow System
                </div>
            </div>
        </div>
    </div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    // 1. استيراد مكتبات الفايرستور (مهم جداً لجلب دور المستخدم)
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    // إعدادات مشروعك في فايربيس
    const firebaseConfig = {
        apiKey: "AIzaSyCLDQ_Ud6AChKO0UOueeAfNBkdveQwqu-8",
        authDomain: "uqt-hadeel.firebaseapp.com",
        projectId: "uqt-hadeel",
        storageBucket: "uqt-hadeel.firebasestorage.app",
        messagingSenderId: "886699861255",
        appId: "1:886699861255:web:256791f33ef0ed0aecd1a2"
    };

    // تهيئة الفايربيس
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app); // تهيئة قاعدة البيانات

    // ربط العناصر
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.querySelector('.btn-login');

    loginForm.addEventListener('submit', (event) => {
        event.preventDefault();

        // جلب القيم باستخدام الـ IDs الصحيحة الموجودة في الـ HTML
        const email = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        loginBtn.innerHTML = 'جاري التحقق...';
        loginBtn.disabled = true;

        // التحقق من الهوية عبر فايربيس
        signInWithEmailAndPassword(auth, email, password)
            .then(async (userCredential) => {
                const user = userCredential.user;

                try {
                    // 2. جلب بيانات المستخدم من جدول users لمعرفة صلاحياته
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);

                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        
                        // 3. توجيه المستخدم حسب دوره (Role)
                        if (userData.role === 'admin') {
                            alert('مرحباً بكِ في لوحة الإدارة.');
                            window.location.href = 'admin.html'; // توجيه المديرة
                        } else {
                            alert('مرحباً بكِ في لوحة المدربة.');
                            window.location.href = 'trianer.html'; // توجيه المدربة
                        }
                    } else {
                        alert('حسابك موثق، لكن بيانات الصلاحية غير موجودة في النظام.');
                        loginBtn.innerHTML = 'تسجيل الدخول';
                        loginBtn.disabled = false;
                    }
                } catch (error) {
                    console.error("خطأ في جلب بيانات المستخدم:", error);
                    alert('حدث خطأ أثناء فحص الصلاحيات.');
                    loginBtn.innerHTML = 'تسجيل الدخول';
                    loginBtn.disabled = false;
                }
            })
            .catch((error) => {
                let errorMessage = 'حدث خطأ في تسجيل الدخول.';
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    errorMessage = 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
                }
                alert(errorMessage);
                console.error("Firebase Error:", error.message);
                loginBtn.innerHTML = 'تسجيل الدخول';
                loginBtn.disabled = false;
            });
    });
</script>
</body>
</html>
